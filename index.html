<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Portal de Juegos</title>
<style>
    body {
        font-family: Arial;
        background: #111;
        color: white;
        text-align: center;
    }
    h1 {
        color: #00ffcc;
    }
    .game {
        margin: 20px;
        padding: 15px;
        background: #222;
        border-radius: 10px;
        display: inline-block;
        width: 250px;
    }
    button {
        padding: 10px;
        background: #00ffcc;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    iframe {
        margin-top: 20px;
        width: 80%;
        height: 500px;
        border: 2px solid #00ffcc;
    }
</style>
</head>
<body>

<h1>🎮 Portal de Juegos</h1>

<div class="game">
    <h3>Snake</h3>
    <button onclick="loadGame('https://playsnake.org/')">Jugar</button>
</div>

<div class="game">
    <h3>Tetris</h3>
    <button onclick="loadGame('https://tetris.com/play-tetris')">Jugar</button>
</div>

<div class="game">
    <h3>Pacman</h3>
    <button onclick="loadGame('https://www.google.com/logos/2010/pacman10-i.html')">Jugar</button>
</div>

<div>
    <iframe id="gameFrame"></iframe>
</div>

<script>
function loadGame(url) {
    document.getElementById("gameFrame").src = url;
}
</script>

</body>
</html>
